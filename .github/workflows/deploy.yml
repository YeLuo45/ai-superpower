name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create site directory
        run: mkdir -p site/data

      - name: Copy data files
        run: |
          cp db/proposals.csv site/data/ 2>/dev/null || true
          cp db/projects.csv site/data/ 2>/dev/null || true

      - name: Copy templates and static files
        run: |
          cp -r src/ai_superpower/templates/* site/ 2>/dev/null || true
          cp -r src/ai_superpower/static/* site/ 2>/dev/null || true
          ls -la site/

      - name: Prepare Web UI for deployment
        run: |
          # Use web-ui.html as the main index for SPA behavior
          cp web-ui.html site/index.html

      - name: Copy 404.html
        run: cp .github/workflows/404.html site/404.html

      - name: Push to gh-pages via GitHub REST API
        run: python3 << 'PYEOF'
import subprocess, os, base64, urllib.request, json

site_dir = "site"
branch = "gh-pages"
repo = "YeLuo45/ai-superpower-dev"
token = os.environ.get("GITHUB_TOKEN", "")

def github_api(method, path, data=None):
    url = f"https://api.github.com/{path}"
    headers = {
        "Authorization": f"token {token}",
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
    }
    req = urllib.request.Request(url, data=json.dumps(data).encode() if data else None, headers=headers, method=method)
    try:
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())
    except Exception as e:
        print(f"API error: {e}")
        return None

# Get current ref
ref_data = github_api("GET", f"repos/{repo}/git/ref/heads/{branch}")
if not ref_data:
    main_sha = github_api("GET", f"repos/{repo}/git/ref/heads/master")["object"]["sha"]
    github_api("POST", f"repos/{repo}/git/refs", {"ref": "refs/heads/gh-pages", "sha": main_sha})
    ref_data = github_api("GET", f"repos/{repo}/git/ref/heads/{branch}")

current_tree_sha = ref_data["object"]["sha"]

tree_items = []
for root, dirs, files in os.walk(site_dir):
    for fname in files:
        fpath = os.path.join(root, fname)
        rel_path = os.path.relpath(fpath, site_dir)
        with open(fpath, "rb") as f:
            content = f.read()
        encoded = base64.b64encode(content).decode()
        blob = github_api("POST", f"repos/{repo}/git/blobs", {"content": encoded, "encoding": "base64"})
        if blob:
            tree_items.append({"path": rel_path, "mode": "100644", "type": "blob", "sha": blob["sha"]})

new_tree = github_api("POST", f"repos/{repo}/git/trees", {"base_tree": current_tree_sha, "tree": tree_items})
if not new_tree:
    print("Failed to create tree")
    exit(1)

commit = github_api("POST", f"repos/{repo}/git/commits", {
    "message": "Deploy: static site via GitHub Actions",
    "tree": new_tree["sha"],
    "parents": [current_tree_sha]
})

github_api("PATCH", f"repos/{repo}/git/refs/heads/{branch}", {"sha": commit["sha"]})
print(f"Deployed successfully: {commit['sha']}")
PYEOF