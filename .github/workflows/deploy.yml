name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create site directory
        run: mkdir -p site/data

      - name: Copy data files
        run: |
          cp db/proposals.csv site/data/ 2>/dev/null || true
          cp db/projects.csv site/data/ 2>/dev/null || true

      - name: Copy templates and static files
        run: |
          cp -r src/ai_superpower/templates/* site/ 2>/dev/null || true
          cp -r src/ai_superpower/static/* site/ 2>/dev/null || true
          ls -la site/

      - name: Create 404.html
        run: |
          echo '' | base64 -d > site/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com