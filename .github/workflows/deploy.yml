name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create site directory
        run: mkdir -p site/data

      - name: Copy data files
        run: |
          cp db/proposals.csv site/data/ 2>/dev/null || true
          cp db/projects.csv site/data/ 2>/dev/null || true

      - name: Copy templates and static files
        run: |
          cp -r src/ai_superpower/templates/* site/ 2>/dev/null || true
          cp -r src/ai_superpower/static/* site/ 2>/dev/null || true
          ls -la site/

      - name: Create 404.html
        run: |
          tee site/404.html > /dev/null << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Superpower Dev - Page Not Found</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { color: #333; }
    ul { line-height: 1.8; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>Select a page:</p>
  <ul>
    <li><a href="/index.html">Index</a></li>
    <li><a href="/settings.html">Settings</a></li>
    <li><a href="/audit.html">Audit</a></li>
    <li><a href="/projects/list.html">Projects</a></li>
    <li><a href="/proposals/list.html">Proposals</a></li>
  </ul>
  <p><a href="/">Go to Home</a></p>
  <script>
    var path = window.location.pathname;
    if (path && path !== '/') {
      fetch(path).then(function(r) {
        if (r.ok) window.location.href = path;
      }).catch(function() {});
    }
  </script>
</body>
</html>
EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com